career-profile:
    title: Career Summary
    summary: |
      Co-author of <i>The Value Flywheel Effect</i> (IT Revolution, 2022) and a recognised voice in the global engineering community on cloud strategy, AI-driven transformation and modern architecture practice.
      A Director of Architecture with fifteen years of experience setting technical vision, scaling architecture functions, and leading engineering organisations through complex, high-stakes modernisation programmes.
      Currently pioneering G-P's AI transformation agenda — establishing Agentic SDLC practices, AI governance frameworks and GenAI tooling adoption across the engineering organisation.
      Brings deep expertise in cloud-native and event-driven architecture, grounded in a strong conviction that lasting technical change is inseparable from great engineering culture and people leadership.


