experiences:
    - role: Director of Architecture
      time: July 2021 - Present
      company: G-P - Globalization Partners
      details: |
         - Since November 2024, serves as principal technical architect for G-P's core EOR product, leading its modernisation into Agentic experiences and a scalable distributed architecture.
         - Owns and drives G-P's AI Modernisation and Transformation agenda — defining architectural strategy and governance frameworks for responsible, organisation-wide AI adoption.
         - Pioneered an Agentic SDLC initiative, embedding AI agents and GenAI tooling into the software delivery lifecycle and advancing engineering velocity through hands-on, experimental practice.
         - Previously set architectural direction across Billing, Fintech, Partner Integrations and Emerging Products, driving the platform transition to Event Driven, Serverless-First SaaS architecture.
         - Introduced organisation-wide engineering culture programmes: Security Champions, SCORP continuous improvement, and the Technical Leads community.
         - Mentors and develops a team of Principal and Solutions Architects, driving strategic alignment, coaching and career growth across the architecture practice.

    - role: Technical Architect
      time: Jan 2018 - July 2021
      company: Liberty IT, Belfast
      details: |
         - Defined and drove Liberty IT's cloud-native, serverless-first architectural strategy across platform engineering teams.
         - Led architectural direction and thought leadership for the Horizon unit, guiding 9 development squads through digital transformation.
         - Developed industry situational awareness and technology strategy to support business innovation and executive decision-making.
         - Mentored Solutions Architects and provided executive-level updates to organisational architecture groups.

    - role: Solutions Architect
      time: Jan 2014 - Jan 2018
      company: Liberty IT, Belfast
      details: |
         - Provided solutions architecture oversight across multiple large-scale insurance products, aligning technical strategy to Liberty IT's organisational vision.
         - Drove technical excellence and engineering capability development across 10 aligned teams.
         - Championed emerging technology adoption and led high-quality solutions to complex business problems.

    - role: Principal Software Engineer
      time: Apr 2011 - Jan 2014
      company: Liberty IT, Belfast
      details: |
         - Designed and delivered complex systems architecture, providing technical leadership, coaching and quality oversight for project teams.
         - Contributed to innovation initiatives and Liberty IT’s organisational change programmes.

